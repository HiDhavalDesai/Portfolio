<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Forms and Labels</title>
  </head>
  <body>
<form>
  <p>Enter email</p>
<input type="email" name="useremail" value="">
<input type="Submit" name="" value="Submit">

<!-- Using this the URL at the end changed from html to ?useremail=dasd%40gmail.copm at the end-->
<!-- When clicking submit,I'm assigning a value to useremail, and it's taking that information onto the URL/webs -->
</form>
<br/><br/>

<!-- second test -->
<form>
<p>enter text</p>
<input type="text" name="userinput" value="">
<input type="Submit" name="" value="Submit">

<!-- this give me ?userinput=stuffhere at the end -->
<!-- Whatever I enter into the textbox is  assigned to name-->

</form>


<!-- Action; to another website. -->
<h2>other website -fb</h2>
<form class="" action="https://www.facebook.com" method="get">
  <input type="text" name="userinput" value="">
  <input type="Submit" name="" value="Submit">

<!-- result is - https://www.facebook.com/?userinput=helloworld -->

</form>

<!-- Action; to another page. -->
<h2>other page</h2>
<form class="" action="lecture19.html" method="post">
  <input type="text" name="useremail" value="">
  <input type="Submit" name="" value="Submit">

</form>


<!-- label focused; bad way -->
<form >
<h1>Labels - bad</h1>
<label>
Enter text:
<input type="text" name="" value="b1">
</label>

<!-- With multiple inputs you have to keep calling to label and you don't want to do that -->

<label>
Enter text:
<input type="text" name="" value="b2">
</label>

</form>


<!-- label focused; good way -->
<form >
<h1>Labels - good</h1>
<!-- using for -->
<!-- The for tag here is saying for everything labeled userinput give it this label. -->

<!-- This is cleaner -->

<label for="userinput">Enter Input:</label>
<input id ="userinput" type="text" name="" value="Hello!">

<!-- ID is a possible parameter to uniquely identify an HTML Tag; very helpful when using CSS styles-->

</form>



<form>
<!-- placeholder instead of value, to actual place hold the text and required argument-->
  <h3>input text</h3>
  <label for="input">Enter Your Input</label>
  <input id="input" type="text" name="" placeholder="Name" required>
</form>


  </body>
</html>
