<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Tables</title>
  </head>
  <body>

<!-- table tag declares that there is a table here -->


<table border="1">
<!-- Everything else goes inside this tag  -->
<!-- add border and # for thickness of border -->

<thead>
  <!-- column names go -->
  <!-- th is the actually content that goes in the table head -->
  <th>Number</th>
  <th>color</th>
<th>country</th>
<!-- Aligned as titles -->

</thead>
<!-- outside of thead, we use tr; it's each row -->

<tr>
  <td>250</td>
  <td>red</td>
  <td>usa</td>
  </tr>
<tr>
  <td>100</td>
  <td>Blue</td>
  <td>France</td>
</tr>

</table>

  </body>
</html>
