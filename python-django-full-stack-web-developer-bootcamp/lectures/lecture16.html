<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Tables</title>
  </head>
  <body>
<h1>Tables</h1>

<table border="2">   <!--Auto border, can use css for this -->
  <thead>
    <th>Number</th>
    <th>Color</th>
    <th>Country</th>
  </thead>
  <tr>
    <td>250</td>
    <td>red</td>
    <td>USA</td>
  </tr>
  <tr>
    <td>100</td>
    <td>blue</td>
    <td>France</td>
  </tr>
</table>




  </body>
</html>



 <!-- <table> = HTML tag to let you know that there is a table here
<thead> = allows you to set the first row or the header row of the table
<th> = inside of thead, which are the actual elements that you are placing inside of that header; name of the columns in the table.
<tr> = table rows
<td> = each of the table elements inside; correspond to each column

<table>   telling the code we have a table
<thead>  Where we want column names to go
 <th>Number</th>  First column
 <th>color</th>  Second Column
 <th>country</th>  Third colum
</thead>
<tr> The first row of that table'
 <td></td>   The first first and first column of that table name.
</tr>
</table> -->
