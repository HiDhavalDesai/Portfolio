<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Lists</title>
  </head>
  <body>
    <h1>Lists</h1>
    <!-- Ordered List -->
    <ol>
      <!-- li is list element -->
      <li>First Item</li>
      <li>Second Item</li>
      <li>Third Item</li>
      <!-- With CSS we can change the numbers to roman numerals -->
    </ol>

<!-- Unordered List -->
<ul>
<li>Bullet One</li>
<li>Bullet two</li>
<li>Bullet Three</li>
</ul>

<!-- You can nest lists inside of lists -->
<ol>
  <li>Item 1</li>
    <ul>
      <li>Item 1 Nested</li> <!-- The unordered list is nested in item 1 -->
    </ul>
  <li>Item 2</li>
  <ul>
    <li>Item 2 Nested</li> <!-- The unordered list is nested in item 2 -->
  </ul>
</ol>


<!-- Order list with unordered list -->
<ol>
  <li>Item 1</li>
  <li>Item 2</li>  <!-- The unordered list is in item 2; which is nested -->
  <ul>
    <li>Unorder Item 1</li>
    <li>Unorder Item 2</li>
    <ol>    <!--Nested a second time, an ordered list to see what this looks like -->
      <li>test 1</li>
      <li>test 2</li>
    </ol>
  </ul>
</ol>



  </body>
</html>
